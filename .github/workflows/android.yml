name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew file
      run: chmod +x gradlew
    - name: Run Releases build
      run: ./gradlew clean assembleRelease --no-daemon
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
          name: app
          path: app/build/outputs/apk/release/app-release-unsigned.apk
